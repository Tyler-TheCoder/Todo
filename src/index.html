<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
  </head>
  <body class="dark">
    <div id="app">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div id="sidebar-header">
          <h1>✦ Doable</h1>
          <button id="theme-toggle" title="Toggle theme">🌙</button>
        </div>
        <p id="projects-label">Projects</p>
        <ul id="project-list"></ul>
        <button id="new-project-btn">+ New Project</button>
      </aside>

      <!-- Main View -->
      <main id="main">
        <div id="main-header">
          <div>
            <div id="active-project-title">
              <span class="dot"></span>
              <span id="project-name-label">Default</span>
            </div>
            <p id="todo-count"></p>
          </div>
          <button id="add-todo-btn">+ Add Todo</button>
        </div>
        <ul id="todo-list"></ul>
      </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay">
      <div id="modal">
        <h2 id="modal-title">New Project</h2>

        <div class="modal-field" id="name-field">
          <label for="modal-name-input">Name</label>
          <input type="text" id="modal-name-input" placeholder="Enter name..." />
        </div>

        <div class="modal-field" id="color-field">
          <label>Color</label>
          <div class="color-options" id="color-options"></div>
        </div>

        <div class="modal-actions">
          <button id="modal-cancel">Cancel</button>
          <button id="modal-confirm">Confirm</button>
        </div>
      </div>
    </div>
  </body>
</html>
