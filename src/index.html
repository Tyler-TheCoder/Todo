<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
  </head>
  <body class="dark">
    <div id="app">
      <div id="sidebar-overlay"></div>

      <!-- Sidebar -->
      <aside id="sidebar">
        <div id="sidebar-header">
          <h1>✦ Doable</h1>
          <button id="theme-toggle" title="Toggle theme">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M484-80q-84 0-157.5-32t-128-86.5Q144-253 112-326.5T80-484q0-146 93-257.5T410-880q-18 99 11 193.5T521-521q71 71 165.5 100T880-410q-26 144-138 237T484-80Zm0-80q88 0 163-44t118-121q-86-8-163-43.5T464-465q-61-61-97-138t-43-163q-77 43-120.5 118.5T160-484q0 135 94.5 229.5T484-160Zm-20-305Z"/></svg>
          </button>
        </div>
        <p id="projects-label">Projects</p>
        <ul id="project-list"></ul>
        <button id="new-project-btn">+ New Project</button>
      </aside>

      <!-- Main View -->
      <main id="main">
        <div id="main-header">
          <div class="header-left">
            <button id="menu-toggle" title="Toggle Menu">☰</button>
            <div>
              <div id="active-project-title">
                <span class="dot"></span>
                <span id="project-name-label">Default</span>
              </div>
              <p id="todo-count"></p>
            </div>
          </div>
          <button id="add-todo-btn">+ Add Todo</button>
        </div>
        <ul id="todo-list"></ul>
      </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay">
      <div id="modal">
        <h2 id="modal-title">New Project</h2>

        <div class="modal-field" id="name-field">
          <label for="modal-name-input">Name</label>
          <input type="text" id="modal-name-input" placeholder="Enter name..." />
        </div>

        <div class="modal-field" id="color-field">
          <label>Color</label>
          <div class="color-options" id="color-options"></div>
        </div>

        <div class="modal-actions">
          <button id="modal-cancel">Cancel</button>
          <button id="modal-confirm">Confirm</button>
        </div>
      </div>
    </div>
  </body>
</html>
